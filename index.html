<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>やきとり食堂ひとり レジアプリ試用版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .sold-out { filter: grayscale(1); opacity: 0.6; position: relative; }
        .sold-out::after { content: "欠品"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #ef4444; font-weight: 900; font-size: 1.2rem; transform: rotate(-15deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="app" class="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden">
    
    <header class="bg-slate-900 text-white p-3 flex justify-between items-center z-50">
        <button onclick="openTableSelect()" class="bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 flex items-center flex-shrink-0">
            <span id="display-table" class="text-blue-400 font-black text-base mr-1">?</span>
            <span class="text-[9px] text-slate-400">席▾</span>
        </button>

        <div class="flex-1 text-center px-2">
            <span class="font-bold text-sm tracking-tighter whitespace-nowrap">やきとり食堂ひとり</span>
        </div>

        <div class="flex space-x-1 flex-shrink-0">
            <button onclick="fetchMenu()" class="text-[10px] bg-slate-700 px-2.5 py-2 rounded font-bold">更新</button>
            <button onclick="exportCSV()" class="text-[10px] bg-emerald-700 px-2.5 py-2 rounded font-bold">日報</button>
        </div>
    </header>

    <div id="tab-container" class="flex overflow-x-auto no-scrollbar bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm"></div>
    <div id="menu-container" class="flex-1 overflow-y-auto p-4 pb-52 no-scrollbar"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 max-w-md mx-auto z-40 shadow-2xl">
        <div class="flex justify-between items-end mb-4 px-1">
            <div class="text-left">
                <span class="text-[10px] text-slate-400 block font-bold tracking-widest uppercase">注文金額</span>
                <span class="text-3xl font-mono font-black text-slate-800">¥<span id="total-price">0</span></span>
            </div>
            <button onclick="openHistory()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold text-sm border border-blue-100 flex items-center">
                履歴・数量
                <span id="order-count-badge" class="ml-2 bg-blue-600 text-white text-[10px] rounded-full px-1.5 min-w-[18px] text-center">0</span>
            </button>
        </div>
        <button onclick="clearOrders()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg active:bg-black shadow-lg">会計完了 (席リセット)</button>
    </div>

    <div id="table-modal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl text-center">
            <h3 class="font-black mb-6 text-slate-500 text-sm">席を選択</h3>
            <div class="grid grid-cols-4 gap-3 mb-6">
                <script>
                    for(let i=1; i<=10; i++) document.write(`<button onclick="switchTable('C${i}')" class="bg-slate-50 py-3 rounded-xl font-bold border border-slate-100 active:bg-blue-600 active:text-white">C${i}</button>`);
                </script>
                <button onclick="switchTable('T1')" class="col-span-2 bg-orange-50 py-3 rounded-xl font-bold border border-orange-100 active:bg-orange-600 active:text-white text-orange-700">T1</button>
                <button onclick="switchTable('T2')" class="col-span-2 bg-orange-50 py-3 rounded-xl font-bold border border-orange-100 active:bg-orange-600 active:text-white text-orange-700">T2</button>
            </div>
            <button onclick="closeModal('table-modal')" class="text-slate-400 text-sm">閉じる</button>
        </div>
    </div>

    <div id="order-modal" class="modal">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs shadow-2xl text-center">
            <h3 id="order-modal-title" class="font-black text-lg mb-2">商品名</h3>
            <p id="order-modal-price" class="text-orange-600 font-bold mb-6">¥0</p>
            
            <div id="option-area" class="mb-8 hidden">
                <p class="text-[10px] text-slate-400 mb-3 tracking-widest font-bold uppercase">飲み方・味付け</p>
                <div id="option-buttons" class="grid grid-cols-2 gap-2"></div>
            </div>

            <p class="text-[10px] text-slate-400 mb-3 tracking-widest font-bold uppercase">注文数</p>
            <div class="flex items-center justify-center space-x-6 mb-8">
                <button onclick="updatePendingQty(-1)" class="w-12 h-12 bg-slate-100 rounded-full text-2xl font-bold text-slate-400 active:bg-slate-200">－</button>
                <span id="pending-qty" class="text-4xl font-mono font-black w-12">1</span>
                <button onclick="updatePendingQty(1)" class="w-12 h-12 bg-slate-900 rounded-full text-2xl font-bold text-white active:bg-black">＋</button>
            </div>

            <button onclick="submitOrder()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:bg-blue-700">注文を確定する</button>
            <button onclick="closeModal('order-modal')" class="mt-6 text-slate-400 text-xs">キャンセル</button>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="bg-white rounded-t-3xl w-full max-w-md h-[85vh] mt-auto flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <span class="font-black text-lg">注文履歴 <small id="history-table-name" class="text-slate-400 ml-2"></small></span>
                <button onclick="closeModal('history-modal')" class="text-slate-300 text-2xl">✕</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
            <div class="p-6 bg-slate-50 border-t">
                <div class="flex justify-between items-center mb-4"><span class="font-bold text-slate-500">合計</span><span class="text-2xl font-black text-blue-600">¥<span id="history-total">0</span></span></div>
                <button onclick="closeModal('history-modal')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">閉じる</button>
            </div>
        </div>
    </div>
</div>

<script>
    const MENU_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQqAzC1pf6MrFTr2pakufvQw_vbYvB4_RML6AnS7QmAbqoce6_Ioy56NYwdnVUA4xfXNXrMmx3YDWJk/pub?gid=0&single=true&output=csv';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxd3VoAB-b-AaFiXBJpdHjHW-U7H-NbMbf73t9fMIS26nxrQFUcNZhF8miN5S8cksauSw/exec';

    let tableNo = localStorage.getItem('last_table') || 'C1';
    let menu = [], currentCategory = "", orders = [], salesHistory = JSON.parse(localStorage.getItem('izakaya_all_history')) || [];
    let pendingOrder = { item: null, qty: 1, option: "" };

    document.getElementById('display-table').innerText = tableNo;
    loadTableOrders();

    async function fetchMenu() {
        try {
            const res = await fetch(MENU_CSV_URL + '&t=' + Date.now());
            const text = await res.text();
            const lines = text.split(/\r?\n/).slice(1).filter(l => l);
            menu = lines.map(line => {
                const d = line.split(',');
                return { category: d[0]?.trim(), name: d[1]?.trim(), basePrice: parseInt(d[2]) || 0, displayPrice: parseInt(d[3]) || 0, calcPrice: parseInt(d[4]) || 0, options: d[5]?.trim().toLowerCase() === 'true', isAvailable: d[6]?.trim() !== '0' };
            });
            if (menu.length > 0 && !currentCategory) currentCategory = menu[0].category;
            render();
        } catch (e) { alert("読込失敗"); }
    }

    function render() {
        const cats = [...new Set(menu.map(i => i.category))];
        document.getElementById('tab-container').innerHTML = cats.map(c => `<button onclick="switchCategory('${c}')" class="flex-shrink-0 px-6 py-4 font-black text-[11px] uppercase transition-all border-b-4 ${currentCategory === c ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400'}">${c}</button>`).join('');
        const container = document.getElementById('menu-container');
        container.innerHTML = `<div class="grid grid-cols-2 gap-3">${menu.filter(i => i.category === currentCategory).map(item => {
            const soldOutClass = item.isAvailable ? "" : "sold-out";
            const clickAttr = item.isAvailable ? `onclick="handleItemClick('${item.name}')"` : "";
            let priceDisp = item.displayPrice.toLocaleString();
            priceDisp += item.category.includes("ドリンク") ? `<span class="text-[10px] ml-0.5 font-normal">(税込)</span>` : `<span class="text-[9px] text-slate-400 ml-1 font-normal">(税込¥${item.calcPrice.toLocaleString()})</span>`;
            return `<button ${clickAttr} class="bg-white border border-slate-200 rounded-2xl p-4 text-left shadow-sm active:scale-95 min-h-[90px] ${soldOutClass}"><b class="text-sm font-bold text-slate-800">${item.name}</b><span class="text-orange-600 font-black text-sm block mt-1">¥${priceDisp}</span></button>`;
        }).join('')}</div>`;
        updateTotal();
    }

    function handleItemClick(name) {
        const item = menu.find(i => i.name === name);
        pendingOrder = { item: item, qty: 1, option: "" };
        document.getElementById('order-modal-title').innerText = item.name;
        document.getElementById('order-modal-price').innerText = `¥${item.displayPrice.toLocaleString()}`;
        document.getElementById('pending-qty').innerText = "1";

        const optArea = document.getElementById('option-area');
        const optBtnWrap = document.getElementById('option-buttons');
        if (item.options) {
            optArea.classList.remove('hidden');
            let opts = ["塩", "タレ", "おまかせ"];
            if (item.name === "日本酒") opts = ["冷酒", "常温", "熱燗"];
            else if (item.name === "梅酒") opts = ["ロック", "ソーダ割"];
            else if (item.name === "焼酎") opts = ["ロック", "水割", "お湯割"];
            
            optBtnWrap.innerHTML = opts.map(o => `<button onclick="selectOption('${o}')" class="opt-btn bg-slate-50 py-3 rounded-xl border border-slate-100 font-bold text-sm active:bg-blue-600 active:text-white">${o}</button>`).join('');
            selectOption(opts[0]); // デフォルト選択
        } else {
            optArea.classList.add('hidden');
        }
        document.getElementById('order-modal').classList.add('active');
    }

    function selectOption(o) {
        pendingOrder.option = o;
        document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.classList.toggle('bg-blue-600', btn.innerText === o);
            btn.classList.toggle('text-white', btn.innerText === o);
        });
    }

    function updatePendingQty(delta) {
        pendingOrder.qty = Math.max(1, pendingOrder.qty + delta);
        document.getElementById('pending-qty').innerText = pendingOrder.qty;
    }

    function submitOrder() {
        const item = pendingOrder.item;
        const finalName = pendingOrder.option ? `${item.name}(${pendingOrder.option})` : item.name;
        
        for (let i = 0; i < pendingOrder.qty; i++) {
            const existing = orders.find(o => o.name === finalName && o.price === item.calcPrice);
            if (existing) existing.qty++;
            else orders.push({ name: finalName, price: item.calcPrice, basePrice: item.basePrice, qty: 1 });
            
            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ date: new Date().toLocaleString('ja-JP'), table: tableNo, name: finalName, price: item.calcPrice, basePrice: item.basePrice }) });
        }
        save();
        closeModal('order-modal');
    }

    // 基本機能
    function switchCategory(cat) { currentCategory = cat; render(); }
    function openTableSelect() { document.getElementById('table-modal').classList.add('active'); }
    function switchTable(no) { tableNo = no; localStorage.setItem('last_table', no); document.getElementById('display-table').innerText = no; loadTableOrders(); closeModal('table-modal'); render(); }
    function loadTableOrders() { orders = JSON.parse(localStorage.getItem(`orders_table_${tableNo}`)) || []; updateTotal(); }
    function save() { localStorage.setItem(`orders_table_${tableNo}`, JSON.stringify(orders)); updateTotal(); }
    function updateTotal() {
        const total = orders.reduce((sum, o) => sum + (o.price * o.qty), 0);
        const count = orders.reduce((sum, o) => sum + o.qty, 0);
        document.getElementById('total-price').innerText = total.toLocaleString();
        document.getElementById('order-count-badge').innerText = count;
        if(document.getElementById('history-total')) document.getElementById('history-total').innerText = total.toLocaleString();
    }
    function openHistory() {
        document.getElementById('history-table-name').innerText = `${tableNo}番`;
        document.getElementById('history-list').innerHTML = orders.length ? orders.map((o, idx) => `
            <div class="bg-white border p-4 rounded-2xl flex justify-between items-center shadow-sm">
                <div><div class="font-bold">${o.name}</div><div class="text-orange-600 text-[11px] font-black">¥${o.price.toLocaleString()}</div></div>
                <div class="flex items-center space-x-3 bg-slate-50 p-2 rounded-xl border">
                    <button onclick="changeHistoryQty(${idx}, -1)" class="w-8 h-8 bg-white rounded-lg shadow-sm font-black">-</button>
                    <span class="font-mono font-black text-lg w-6 text-center">${o.qty}</span>
                    <button onclick="changeHistoryQty(${idx}, 1)" class="w-8 h-8 bg-white rounded-lg shadow-sm font-black">+</button>
                </div>
            </div>`).join('') : '<div class="text-center py-20 text-slate-300">履歴なし</div>';
        document.getElementById('history-modal').classList.add('active');
        updateTotal();
    }
    function changeHistoryQty(idx, delta) {
        orders[idx].qty += delta;
        if (orders[idx].qty <= 0) { if(confirm("削除しますか？")) orders.splice(idx, 1); else orders[idx].qty = 1; }
        save(); openHistory();
    }
    function clearOrders() { if (orders.length > 0 && confirm(`${tableNo}番席をリセットしますか？`)) { orders.forEach(o => salesHistory.push({ ...o, date: new Date().toLocaleString('ja-JP'), table: tableNo })); localStorage.setItem('izakaya_all_history', JSON.stringify(salesHistory)); orders = []; save(); } }
    function exportCSV() { let csv = "\uFEFF日時,席,商品名,単価(税込),数量\n"; salesHistory.forEach(s => csv += `${s.date},${s.table},${s.name},${s.price},${s.qty}\n`); window.location.href = `mailto:?subject=売上日報&body=${encodeURIComponent(csv)}`; }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    fetchMenu();
</script>
</body>
</html>
